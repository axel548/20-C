<ion-fab vertical="bottom" horizontal="start" slot="fixed" class="marg">
  <ion-fab-button color="dark">
    <ion-icon name="arrow-up-circle"></ion-icon>
  </ion-fab-button>

  <ion-fab-list side="top">
  <ion-fab-button color="primary" (click)="enlaceFacebook()">
    <ion-icon name="logo-facebook"></ion-icon>
  </ion-fab-button>
  <ion-fab-button color="light" (click)="enlaceInstagram()">
    <ion-icon name="logo-instagram"></ion-icon>
  </ion-fab-button>
  <ion-fab-button color="danger" (click)="enlaceYoutube()">
    <ion-icon name="logo-youtube"></ion-icon>
  </ion-fab-button>
  </ion-fab-list>
</ion-fab>

    <ion-tab-button tab="tab1">
      <ion-icon name="earth-outline"></ion-icon>

    </ion-tab-button>

    <ion-tab-button tab="tab2">
      <ion-icon name="newspaper-outline"></ion-icon>

    </ion-tab-button>

    <ion-tab-button tab="tab3">
      <ion-icon name="fitness-outline"></ion-icon>

  </ion-tab-bar>
